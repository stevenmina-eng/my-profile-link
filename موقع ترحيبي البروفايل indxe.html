<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mohamed Ali لإنشاء المواقع</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:700px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius:25px;
      padding:35px;
      text-align:center;
      box-shadow:0 0 25px rgba(0,0,0,0.3);
    }

    h1{
      font-size:38px;
      margin-bottom:20px;
      color:#ffffff;
    }

    .welcome{
      font-size:18px;
      line-height:1.9;
      margin-bottom:30px;
      color:#e2e8f0;
    }

    .label{
      font-size:20px;
      margin-bottom:15px;
      display:block;
      color:#ffffff;
    }

    textarea{
      width:100%;
      height:180px;
      border:none;
      border-radius:18px;
      padding:18px;
      font-size:17px;
      resize:none;
      outline:none;
      background:#f8fafc;
      color:#111827;
      margin-bottom:25px;
    }

    .btn{
      display:inline-block;
      background: linear-gradient(135deg,#06b6d4,#2563eb);
      color:white;
      text-decoration:none;
      padding:16px 35px;
      border-radius:15px;
      font-size:20px;
      font-weight:bold;
      transition:0.3s;
      cursor:pointer;
      border:none;
    }

    .btn:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    .contact{
      margin-top:40px;
    }

    .contact h2{
      margin-bottom:15px;
      font-size:24px;
    }

    .facebook-btn{
      display:inline-block;
      margin-top:10px;
      background:#1877f2;
      color:white;
      text-decoration:none;
      padding:14px 28px;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      transition:0.3s;
    }

    .facebook-btn:hover{
      transform:scale(1.05);
    }

    footer{
      margin-top:40px;
      color:#cbd5e1;
      font-size:15px;
    }

    @media(max-width:600px){
      h1{
        font-size:30px;
      }

      .welcome{
        font-size:16px;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Mohamed Ali لإنشاء المواقع</h1>

    <p class="welcome">
      السلام عليكم 👋<br><br>
      مع خدمة Mohamed Ali يمكنك إنشاء موقعك الإلكتروني الخاص بشكل احترافي وعصري.<br>
      كل ما عليك هو وصف الموقع الذي تريده، وسنقوم بتحويل فكرتك إلى موقع حقيقي ومميز.
    </p>

    <label class="label">اوصف موقعك الذي تريد إنشاءه:</label>

    <textarea id="websiteDescription" placeholder="مثال: أريد موقع لبيع الملابس يحتوي على صفحة رئيسية ومنتجات ووسيلة تواصل..."></textarea>

    <button class="btn" onclick="sendToMessenger()">
      أنشئ موقعك الآن
    </button>

    <div class="contact">
      <h2>للتواصل أو الاستفسار</h2>

      <a class="facebook-btn"
         href="https://www.facebook.com/MOHAMED.ALE.STORE"
         target="_blank">
         صفحة الفيسبوك
      </a>
    </div>

    <footer>
      © 2026 Mohamed Ali · جميع الحقوق محفوظة
    </footer>

  </div>

  <script>
    function sendToMessenger() {

      let description =
        document.getElementById("websiteDescription").value;

      let message =
        "عاوز أنشئ موقع إلكتروني%0A%0Aوصف الموقع:%0A" +
        encodeURIComponent(description);

      let messengerLink =
        "https://m.me/MOHAMED.ALE.STORE?text=" + message;

      window.open(messengerLink, "_blank");
    }
  </script>

</body>
</html>
